# --------------------------------------------------
# Application
# --------------------------------------------------
spring.application.name=AOP-API

# --------------------------------------------------
# Spring Boot Settings
# --------------------------------------------------
spring.main.banner-mode=off

# --------------------------------------------------
# Logging Configuration
# --------------------------------------------------

# Root logging level
logging.level.root=WARN

# AOP debugging (shows proxy creation, advice execution, etc.)
logging.level.org.springframework.aop=DEBUG

# Spring framework core logs
logging.level.org.springframework=INFO

# Application specific logs (adjust package if needed)
logging.level.com.yourcompany.aop=DEBUG

# Console log pattern (timestamp, thread, level, logger)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# --------------------------------------------------
# Optional AOP Debugging Enhancements
# --------------------------------------------------

# Show proxy class creation details
logging.level.org.springframework.aop.framework=DEBUG

# Show aspect execution details
logging.level.org.springframework.aop.interceptor=TRACE
